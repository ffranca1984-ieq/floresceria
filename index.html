<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel FlorescerIA</title>
    
    <!-- Import Map para a SDK Oficial do Google Gen AI -->
    <script type="importmap">
      {
        "imports": {
          "@google/generative-ai": "https://esm.run/@google/generative-ai"
        }
      }
    </script>

    <!-- Biblioteca para converter Markdown do Gemini em HTML bonito na tela -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        /* Estilização básica para o container de resposta */
        .resposta-ia {
            background-color: #fcf8f2;
            border-left: 4px solid #e0a96d;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            font-family: sans-serif;
            color: #333;
            line-height: 1.6;
        }
        .resposta-ia h3 {
            color: #b87333;
            margin-top: 20px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .resposta-ia h3:first-child {
            margin-top: 0;
        }
        .resposta-ia ul, .resposta-ia ol {
            padding-left: 20px;
        }
        .resposta-ia li {
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

    <!-- Estrutura básica do seu painel (Adapte as classes e IDs conforme seu layout original) -->
    <div id="painel-container">
        <h2>Seu Orientador Pessoal FlorescerIA</h2>
        <textarea id="usuario-pergunta" rows="4" style="width:100%; max-width:500px;" placeholder="Como posso te ajudar hoje? Ex: Estou me sentindo sobrecarregada com as tarefas de casa..."></textarea>
        <br>
        <button id="btn-enviar" onclick="enviarParaIA()">Pedir Orientação 🌸</button>

        <!-- Área onde o resultado formatado vai aparecer -->
        <div id="resultado-container"></div>
    </div>

    <!-- Lógica de Integração com o Gemini -->
    <script type="module">
        import { GoogleGenAI } from "@google/generative-ai";

        // Chave de teste fornecida
        const API_KEY = "AQ.Ab8RN6IibZwWWFz9LtBqKvAqhl-6Nm1hMUkVjGX0XoOQxeEFYA"; 
        const ai = new GoogleGenAI({ apiKey: API_KEY });

        window.getAITip = async function(userMessage) {
            try {
                const systemInstruction = `
                Você é o conselheiro e mentor virtual do projeto FlorescerIA. Sua missão é apoiar mulheres e famílias na jornada de autoconhecimento, restauração de identidade, inteligência emocional e desenvolvimento pessoal.

                [PILARES TEÓRICOS & METODOLOGIA]
                - Base Teórica Principal: Conceitos do Método CIS (Paulo Vieira), incluindo Autorresponsabilidade, Inteligência Emocional, as três colunas do Eu (Identidade, Capacidade, Merecimento) e Visão Extraordinária de Futuro.
                - Base Espiritual: Princípios e valores cristãos/evangélicos, utilizando abordagens acolhedoras, amorosas e baseadas em sabedoria bíblica contextualizada para o cotidiano.

                [TOM DE VOZ]
                - Empático, acolhedor, encorajador e firme quando necessário (focado na ação).
                - Sem julgamentos. Foque em validação emocional seguida de direcionamento para a auto-reflexão.

                [DIRETRIZES DE RESPOSTA (OBRIGATÓRIO)]
                Toda resposta sua DEVE seguir estritamente a estrutura abaixo, separada por títulos claros em Markdown:

                ### 🌸 Palavra de Acolhimento e Sabedoria
                (Um breve parágrafo validando os sentimentos do usuário, trazendo uma perspectiva baseada em inteligência emocional e um versículo ou princípio bíblico de conforto.)

                ### 🧭 Reflexão Profunda
                (Uma ou duas perguntas reflexivas baseadas no Método CIS para fazer a pessoa olhar para dentro e identificar a raiz do problema.)

                ### 🛠️ Plano de Ação (3 Atitudes Práticas)
                Crie exatamente 3 ações imediatas, práticas e mensuráveis. Formate como uma lista numerada:
                1. **[Ação 1]**: Descrição objetiva do que fazer hoje.
                2. **[Ação 2]**: Descrição objetiva do segundo passo.
                3. **[Ação 3]**: Descrição objetiva de uma atitude voltada para o futuro ou relacionamento familiar.
                `;

                // Chamando o modelo Gemini 1.5 Flash
                const response = await ai.models.generateContent({
                    model: 'gemini-1.5-flash',
                    contents: userMessage,
                    config: {
                        systemInstruction: systemInstruction,
                        temperature: 0.7
                    }
                });

                return response.text;

            } catch (error) {
                console.error("Erro ao chamar o Gemini:", error);
                return "Desculpe, tive um pequeno problema ao processar seu conselho agora. Pode tentar novamente em instantes? 🌸";
            }
        }

        // Função que lida com o clique do botão na tela
        window.enviarParaIA = async function() {
            const pergunta = document.getElementById("usuario-pergunta").value;
            const container = document.getElementById("resultado-container");
            
            if (!pergunta.trim()) {
                alert("Por favor, digite o que está sentindo ou sua dúvida.");
                return;
            }

            container.innerHTML = "<p>Buscando sabedoria e preparando seu direcionamento... Espere um momento. 🌸</p>";

            // Chama a função que criamos acima
            const respostaMarkdown = await window.getAITip(pergunta);

            // Usa a biblioteca 'marked' para transformar o Markdown em HTML estruturado
            const respostaHTML = marked.parse(respostaMarkdown);

            // Insere no container com a classe de estilo estilizada
            container.innerHTML = `<div class="resposta-ia">${respostaHTML}</div>`;
        }
    </script>
</body>
</html>
